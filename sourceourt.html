<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Source Court — AP Research Edition</title>
<style>
/* ===== RESET & ROOT ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #07091a;
  --surface:     #0f1424;
  --card:        #131828;
  --card2:       #1a2040;
  --gold:        #c9a84c;
  --gold-bright: #f0c94a;
  --gold-dim:    rgba(201,168,76,0.18);
  --gold-border: rgba(201,168,76,0.35);
  --text:        #e4e6f2;
  --muted:       #6b7492;
  --red:         #e63946;
  --red-dim:     rgba(230,57,70,0.12);
  --green:       #2a9d8f;
  --green-dim:   rgba(42,157,143,0.12);
  --radius:      12px;
  --shadow:      0 6px 28px rgba(0,0,0,0.5);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 50% at 15% 60%, rgba(201,168,76,0.04) 0%, transparent 100%),
    radial-gradient(ellipse 60% 40% at 85% 20%, rgba(42,100,157,0.04) 0%, transparent 100%);
}

/* ===== SCREENS ===== */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; animation: fadeUp 0.3s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== SHARED UTILITY ===== */
.gold { color: var(--gold); }
.muted { color: var(--muted); }

/* ===== WELCOME SCREEN ===== */
#screen-welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 20px 60px;
  gap: 0;
}
#screen-welcome.active { display: flex; }

.emblem {
  text-align: center;
  margin-bottom: 36px;
}
.emblem-icon {
  font-size: 60px;
  display: block;
  margin-bottom: 14px;
  filter: drop-shadow(0 0 24px rgba(201,168,76,0.45));
  animation: glow 3s ease-in-out infinite alternate;
}
@keyframes glow {
  from { filter: drop-shadow(0 0 12px rgba(201,168,76,0.3)); }
  to   { filter: drop-shadow(0 0 28px rgba(201,168,76,0.6)); }
}
.emblem-title {
  font-size: clamp(38px, 9vw, 58px);
  color: var(--gold);
  letter-spacing: 0.18em;
  text-shadow: 0 0 40px rgba(201,168,76,0.25);
  line-height: 1;
}
.emblem-sub {
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}

.welcome-card {
  background: var(--card);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  padding: 32px 28px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
}
.welcome-card h2 {
  font-size: 20px;
  color: var(--gold);
  text-align: center;
  margin-bottom: 10px;
}
.welcome-intro {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.65;
  text-align: center;
  margin-bottom: 20px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.welcome-intro em { color: var(--text); font-style: normal; }

/* ===== INSTRUCTIONS ===== */
.instructions-box {
  background: var(--surface);
  border: 1px solid var(--gold-border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 24px;
  text-align: left;
}
.instructions-box h3 {
  font-size: 13px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.instructions-box ol {
  padding-left: 20px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.instructions-box li { margin-bottom: 8px; }
.instructions-box li:last-child { margin-bottom: 0; }
.instructions-box strong { color: var(--text); }

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 7px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.form-group input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--gold-border);
  border-radius: 8px;
  padding: 11px 15px;
  color: var(--text);
  font-size: 15px;
  font-family: Georgia, serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
}

.btn-enter {
  width: 100%;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  cursor: pointer;
  margin-top: 6px;
  transition: background 0.15s, transform 0.1s;
}
.btn-enter:hover { background: var(--gold-bright); }
.btn-enter:active { transform: scale(0.98); }

.welcome-footer {
  margin-top: 16px;
  text-align: center;
}
.btn-ghost {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 12px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  cursor: pointer;
  transition: color 0.2s;
  padding: 4px 8px;
  letter-spacing: 0.05em;
}
.btn-ghost:hover { color: var(--gold); }

/* ===== SOURCE SCREEN ===== */
#screen-source { padding: 0 0 80px; max-width: 680px; margin: 0 auto; }

.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px; background: rgba(7,9,26,0.9);
  border-bottom: 1px solid var(--gold-border);
  position: sticky; top: 0; z-index: 10; backdrop-filter: blur(8px);
}
.topbar-logo {
  font-size: 13px; color: var(--gold); letter-spacing: 0.14em;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.topbar-right { display: flex; align-items: center; gap: 14px; }
.topbar-progress {
  font-size: 12px; color: var(--muted);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}

.progress-track { height: 2px; background: rgba(201,168,76,0.12); }
.progress-fill { height: 100%; background: var(--gold); transition: width 0.5s; }

.source-body { padding: 24px 20px 0; }

.case-badge-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.exhibit-tag {
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.type-badge {
  background: var(--gold-dim); border: 1px solid var(--gold-border); color: var(--gold);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 20px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}

.case-file {
  background: var(--card); border: 1px solid var(--gold-border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.case-file-top { padding: 20px 22px 18px; border-bottom: 1px solid rgba(201,168,76,0.08); }
.source-title { font-size: 17px; color: #fff; line-height: 1.4; margin-bottom: 16px; }
.meta-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 14px; }
.meta-k {
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; line-height: 2;
}
.meta-v {
  font-size: 13px; color: var(--muted); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; line-height: 2;
}
.excerpt-area { padding: 16px 22px; background: rgba(0,0,0,0.22); }
.excerpt-kicker {
  font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; display: block; margin-bottom: 8px;
}
.excerpt-quote { font-size: 14px; color: var(--text); line-height: 1.7; font-style: italic; }

.cross-exam {
  background: var(--card); border: 1px solid var(--gold-border);
  border-radius: var(--radius); padding: 20px 22px; margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.cross-exam-title {
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.cross-exam-title::after { content: ''; flex: 1; height: 1px; background: var(--gold-border); }

.q-row { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.q-row:last-child { border-bottom: none; }
.q-text { font-size: 14px; color: var(--text); margin-bottom: 10px; line-height: 1.45; }
.yn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.yn-btn {
  padding: 5px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12);
  background: transparent; color: var(--muted); font-size: 11px; font-weight: bold;
  letter-spacing: 0.12em; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  cursor: pointer; transition: all 0.15s;
}
.yn-btn:hover:not(.sel-yes):not(.sel-no):not(.sel-maybe) { border-color: rgba(255,255,255,0.28); color: var(--text); }
.yn-btn.sel-yes { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.yn-btn.sel-no { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.yn-btn.sel-maybe { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

.ruling-zone { padding: 0 0 4px; }
.ruling-label {
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; text-align: center; margin-bottom: 14px;
}
.ruling-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-rule {
  padding: 16px 12px; border-radius: 10px; border: 2px solid; font-size: 14px; font-weight: bold;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.btn-admit { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.btn-admit:not(:disabled):hover { background: var(--green); color: #fff; box-shadow: 0 4px 20px rgba(42,157,143,0.35); transform: translateY(-2px); }
.btn-dismiss { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.btn-dismiss:not(:disabled):hover { background: var(--red); color: #fff; box-shadow: 0 4px 20px rgba(230,57,70,0.35); transform: translateY(-2px); }
.btn-rule:disabled { opacity: 0.28; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.ruling-hint {
  text-align: center; margin-top: 12px; font-size: 11px; color: var(--muted);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-style: italic;
}

/* ===== VERDICT SCREEN ===== */
#screen-verdict { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }

.verdict-hero { text-align: center; padding: 8px 0 32px; }
.verdict-hero-icon { font-size: 52px; display: block; margin-bottom: 14px; filter: drop-shadow(0 0 20px rgba(201,168,76,0.4)); }
.verdict-hero h1 { font-size: 26px; color: var(--gold); letter-spacing: 0.18em; margin-bottom: 22px; }
.score-wrap {
  display: inline-flex; align-items: baseline; gap: 4px; background: var(--card2);
  border: 1px solid var(--gold-border); border-radius: 16px; padding: 12px 28px; margin-bottom: 10px;
}
.score-n { font-size: 64px; color: var(--gold); line-height: 1; font-weight: bold; }
.score-d { font-size: 32px; color: var(--muted); }
.score-rank {
  font-size: 12px; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; margin-top: 6px;
}

.verdict-divider {
  display: flex; align-items: center; gap: 12px; margin: 24px 0 20px;
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.verdict-divider::before, .verdict-divider::after { content: ''; flex: 1; height: 1px; background: var(--gold-border); }

.vcard {
  background: var(--card); border: 1px solid; border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 12px; display: flex; gap: 14px; align-items: flex-start;
}
.vcard.vright { border-color: rgba(42,157,143,0.35); background: linear-gradient(120deg, var(--card), rgba(42,157,143,0.04)); }
.vcard.vwrong { border-color: rgba(230,57,70,0.35); background: linear-gradient(120deg, var(--card), rgba(230,57,70,0.04)); }
.vstamp {
  flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 14px; margin-top: 2px; font-weight: bold;
}
.vstamp.st-right { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.vstamp.st-wrong { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }

.vcard-body { flex: 1; min-width: 0; }
.vcard-title { font-size: 14px; color: #fff; margin-bottom: 7px; line-height: 1.35; }
.vcard-chips { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.chip {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 9px;
  border-radius: 4px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-weight: bold;
}
.chip-your-a { background: rgba(42,157,143,0.18); color: var(--green); }
.chip-your-d { background: rgba(230,57,70,0.18); color: var(--red); }
.chip-exp-a  { background: rgba(201,168,76,0.14); color: var(--gold); }
.chip-exp-d  { background: rgba(201,168,76,0.14); color: var(--gold); }
.vcard-explanation {
  font-size: 13px; color: var(--muted); line-height: 1.55; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}

.verdict-actions { margin-top: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-outline, .btn-solid {
  padding: 13px; border-radius: 8px; font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; text-align: center; border: 1px solid var(--gold-border);
}
.btn-outline { background: transparent; color: var(--gold); }
.btn-outline:hover { background: var(--gold-dim); border-color: var(--gold); }
.btn-solid { border: none; background: var(--gold); color: var(--bg); font-weight: bold; }
.btn-solid:hover { background: var(--gold-bright); }

/* ===== LEADERBOARD SCREEN ===== */
#screen-leaderboard
